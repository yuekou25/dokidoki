<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ tạo Furigana tự động</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 700px;
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #e67e22;
            font-style: italic;
        }
        #output {
            margin-top: 25px;
            padding: 20px;
            background: #f9fbfd;
            border: 1px dashed #bdc3c7;
            border-radius: 8px;
            font-size: 24px;
            line-height: 2.5;
            min-height: 80px;
        }
        /* Style cho Furigana */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 13px;
            color: #e74c3c; /* Màu đỏ cho dễ nhìn */
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/kuroshiro@1.2.0/dist/kuroshiro.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/kuroshiro-analyzer-kuromoji@1.1.0/dist/kuroshiro-analyzer-kuromoji.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Trình tạo Furigana tự động</h2>
    <p>Nhập văn bản tiếng Nhật có chứa Kanji vào bên dưới:</p>
    
    <textarea id="inputText" placeholder="Ví dụ: 日本語を勉強しています。"></textarea>
    
    <button id="convertBtn" disabled>Đang tải từ điển...</button>
    <div id="status">Hệ thống đang tải bộ từ điển tiếng Nhật (lần đầu sẽ mất vài giây)...</div>

    <div id="output">Kết quả sẽ hiển thị ở đây...</div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const btn = document.getElementById('convertBtn');
        const input = document.getElementById('inputText');
        const output = document.getElementById('output');
        const status = document.getElementById('status');

        // Khởi tạo Kuroshiro
        const kuroshiro = new Kuroshiro();
        
        try {
            // Khởi tạo bộ phân tích Kuromoji và trỏ tới thư mục chứa từ điển (hosted trên CDN)
           await kuroshiro.init(new KuromojiAnalyzer({
    dictPath: "https://unpkg.com/kuromoji@0.1.2/dict"
}));
            
            // Tải xong từ điển, cho phép người dùng click nút
            status.style.color = "#27ae60";
            status.innerText = "✅ Từ điển đã sẵn sàng!";
            btn.innerText = "Tạo Furigana";
            btn.disabled = false;

        } catch (error) {
            status.style.color = "#c0392b";
            status.innerText = "❌ Lỗi khi tải từ điển: " + error.message;
            return;
        }

        // Sự kiện khi bấm nút tạo Furigana
        btn.addEventListener('click', async () => {
            const text = input.value.trim();
            if (!text) {
                alert("Vui lòng nhập văn bản!");
                return;
            }

            btn.disabled = true;
            status.style.color = "#e67e22";
            status.innerText = "⏳ Đang phân tích ngữ pháp và tạo Furigana...";

            try {
                // Sử dụng hàm convert: mode "furigana" sẽ tự động tạo thẻ <ruby> HTML
                const result = await kuroshiro.convert(text, { 
                    to: "hiragana", 
                    mode: "furigana" 
                });
                
                output.innerHTML = result;
                status.style.color = "#27ae60";
                status.innerText = "✅ Hoàn tất!";
            } catch (error) {
                status.style.color = "#c0392b";
                status.innerText = "❌ Lỗi xử lý: " + error.message;
            } finally {
                btn.disabled = false;
            }
        });
    });
</script>

</body>
</html>
