<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Rắn Săn Mồi 🐍</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        h1 { margin-bottom: 10px; }
        #game-container {
            position: relative;
            border: 5px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            background-color: #000;
        }
        .score-board {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .instructions {
            margin-top: 15px;
            color: #bdc3c7;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Game Rắn Săn Mồi 🐍</h1>
    <div class="score-board">Điểm: <span id="score">0</span></div>
    
    <div id="game-container">
        <canvas id="snakeGame" width="400" height="400"></canvas>
    </div>

    <div class="instructions">Sử dụng các phím mũi tên (↑ ↓ ← →) để di chuyển</div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const box = 20; // Kích thước 1 ô vuông
        let score = 0;
        let gameSpeed = 100; // Tốc độ game (ms)

        // Khởi tạo con rắn (mảng các tọa độ)
        let snake = [
            {x: 9 * box, y: 10 * box},
            {x: 8 * box, y: 10 * box}
        ];

        // Khởi tạo thức ăn
        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };

        let d; // Hướng di chuyển

        // Lắng nghe sự kiện bàn phím
        document.addEventListener("keydown", direction);

        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }

        // Kiểm tra va chạm với thân
        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            // Xóa canvas cũ
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Vẽ rắn
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#2ecc71" : "#27ae60"; // Đầu màu sáng hơn thân
                ctx.strokeStyle = "#000";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // Vẽ thức ăn
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box, box);

            // Lấy tọa độ đầu rắn cũ
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            // Di chuyển đầu rắn theo hướng d
            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            // Kiểm tra nếu ăn được mồi
            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                // Tạo thức ăn mới
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                // Xóa đuôi rắn (tạo cảm giác di chuyển)
                if (d) snake.pop(); 
            }

            // Tạo đầu mới cho rắn
            let newHead = { x: snakeX, y: snakeY };

            // Kiểm tra luật thua (va tường hoặc va vào thân)
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("Game Over! Điểm của bạn: " + score);
                location.reload(); // Tải lại trang để chơi mới
            }

            if (d) snake.unshift(newHead); // Thêm đầu mới vào mảng
        }

        // Chạy hàm draw lặp lại theo tốc độ gameSpeed
        let game = setInterval(draw, gameSpeed);
    </script>
</body>
</html>
