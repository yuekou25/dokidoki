<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không Gian Làm Việc</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Phần Đồng hồ và Lời chào */
        #time {
            font-size: 80px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        #greeting {
            font-size: 32px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* Phần Quản lý công việc (To-Do List) */
        .todo-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* Hiệu ứng kính mờ (Glassmorphism) */
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .todo-container h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
        }

        ul {
            list-style-type: none;
            text-align: left;
        }

        li {
            background: rgba(255, 255, 255, 0.2);
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        li:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Nút xóa công việc */
        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .delete-btn:hover {
            background: #ff6b81;
        }

    </style>
</head>
<body>

    <div id="time">00:00</div>
    <div id="greeting">Chào bạn!</div>

    <div class="todo-container">
        <h3>Mục tiêu hôm nay</h3>
        <input type="text" id="todoInput" placeholder="Nhập công việc và nhấn Enter...">
        <ul id="todoList">
            </ul>
    </div>

    <script>
        // 1. XỬ LÝ ĐỒNG HỒ VÀ LỜI CHÀO
        const timeDisplay = document.getElementById('time');
        const greetingDisplay = document.getElementById('greeting');

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();

            // Thêm số 0 đằng trước nếu phút < 10 (ví dụ: 09 thay vì 9)
            minutes = minutes < 10 ? '0' + minutes : minutes;
            timeDisplay.textContent = `${hours}:${minutes}`;

            // Đổi lời chào theo giờ
            if (hours < 12) {
                greetingDisplay.textContent = "Chào buổi sáng! ☕";
            } else if (hours < 18) {
                greetingDisplay.textContent = "Chào buổi chiều! ☀️";
            } else {
                greetingDisplay.textContent = "Chào buổi tối! 🌙";
            }
        }

        // Cập nhật đồng hồ mỗi giây
        setInterval(updateClock, 1000);
        updateClock(); // Chạy ngay lập tức khi mở web

        // 2. XỬ LÝ TO-DO LIST VÀ LƯU DỮ LIỆU
        const todoInput = document.getElementById('todoInput');
        const todoList = document.getElementById('todoList');

        // Lấy dữ liệu từ LocalStorage (nếu chưa có thì tạo mảng rỗng)
        let todos = JSON.parse(localStorage.getItem('myTodos')) || [];

        // Hàm vẽ danh sách công việc ra màn hình
        function renderTodos() {
            todoList.innerHTML = ''; // Xóa sạch HTML cũ
            todos.forEach((todo, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${todo}</span>
                    <button class="delete-btn" onclick="deleteTodo(${index})">Xóa</button>
                `;
                todoList.appendChild(li);
            });
        }

        // Hàm thêm công việc mới
        todoInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && todoInput.value.trim() !== '') {
                todos.push(todoInput.value.trim()); // Thêm vào mảng
                localStorage.setItem('myTodos', JSON.stringify(todos)); // Lưu vào trình duyệt
                todoInput.value = ''; // Xóa ô nhập
                renderTodos(); // Vẽ lại danh sách
            }
        });

        // Hàm xóa công việc
        function deleteTodo(index) {
            todos.splice(index, 1); // Cắt phần tử khỏi mảng
            localStorage.setItem('myTodos', JSON.stringify(todos)); // Cập nhật lại bộ nhớ
            renderTodos(); // Vẽ lại danh sách
        }

        // Vẽ danh sách ngay khi tải trang
        renderTodos();
    </script>

</body>
</html>
